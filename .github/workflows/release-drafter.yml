name: Release Drafter

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for this release (e.g. 1.0.0)'
        required: true
        default: '0.0.0'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm i

      - name: Build
        run: npm run dev

      - name: Package Build Output
        run: |
          zip -r Release-v${{ github.event.inputs.version }}.zip .millennium backend LICENSE plugin.json README.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: Release-v${{ github.event.inputs.version }}.zip
          overwrite_files: true
          draft: true
